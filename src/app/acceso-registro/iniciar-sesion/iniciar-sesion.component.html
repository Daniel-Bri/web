<!-- CU02 - Iniciar Sesión -->
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">RutaSegura</div>
      <p class="auth-subtitle">Inicia sesión en tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu&#64;correo.com"
          autocomplete="email"
        />
        @if (email.invalid && email.touched) {
          <span class="field-error">Ingresa un correo válido</span>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        @if (password.invalid && password.touched) {
          <span class="field-error">Mínimo 6 caracteres</span>
        }
      </div>

      @if (serverError) {
        <span class="server-error">{{ serverError }}</span>
      }

      <button type="submit" class="btn-primary" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span>
        } @else {
          Iniciar sesión
        }
      </button>

    </form>

    <p class="auth-footer">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>

  </div>
</div>
